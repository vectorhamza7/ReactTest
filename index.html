<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Experience</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>

<body>
    <model-viewer id="model-viewer" src="SENTAL TEST.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls
        touch-action="pan-y" shadow-intensity="1" auto-rotate scale="0.1 0.1 0.1">
    </model-viewer>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading 3D Model...</div>
    </div>

    <div id="instructions-overlay">
        <strong>AR Mode Active</strong><br>
        Tap to place • Pinch to scale • Drag to rotate
    </div>

    <div id="error-message"></div>

    <button id="ar-button">
        <span class="ar-icon">📷</span>
        Enter AR
    </button>

</body>

</html>
